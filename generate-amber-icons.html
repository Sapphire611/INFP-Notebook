<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Generate Amber TabBar Icons</title>
</head>
<body>
    <h1>TabBar Icon Generator</h1>
    <button onclick="generateHomeIcon()">生成 Home Active 图标</button>
    <button onclick="generateProfileIcon()">生成 Profile Active 图标</button>
    <div id="output"></div>

    <script>
        function createIcon(color, emoji) {
            const canvas = document.createElement('canvas');
            canvas.width = 90;
            canvas.height = 90;
            const ctx = canvas.getContext('2d');

            // 清除画布
            ctx.clearRect(0, 0, 90, 90);

            // 设置字体
            ctx.font = '64px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // 绘制 emoji
            ctx.fillText(emoji, 45, 45);

            return canvas;
        }

        function colorIconToAmber(canvas) {
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            const amberR = 0xEE;
            const amberG = 0xC3;
            const amberB = 0x62;

            for (let i = 0; i < data.length; i += 4) {
                // 如果是绿色（原来的选中颜色），替换为琥珀色
                // 绿色范围判断
                if (data[i + 1] > 150 && data[i] < 100 && data[i + 2] < 100) {
                    data[i] = amberR;
                    data[i + 1] = amberG;
                    data[i + 2] = amberB;
                }
            }

            ctx.putImageData(imageData, 0, 0);
            return canvas;
        }

        function downloadCanvas(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function generateHomeIcon() {
            const canvas = createIcon('#EEC362', '🏠');
            const amberCanvas = colorIconToAmber(canvas);
            downloadCanvas(amberCanvas, 'home-active.png');
            document.getElementById('output').innerHTML += '<p>home-active.png 已生成</p>';
        }

        function generateProfileIcon() {
            const canvas = createIcon('#EEC362', '👤');
            const amberCanvas = colorIconToAmber(canvas);
            downloadCanvas(amberCanvas, 'profile-active.png');
            document.getElementById('output').innerHTML += '<p>profile-active.png 已生成</p>';
        }
    </script>
</body>
</html>
